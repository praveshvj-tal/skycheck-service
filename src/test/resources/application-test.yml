spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: false

app:
  seat-hold:
    ttl-seconds: 120
    cleanup-interval-seconds: 5

  baggage:
    max-weight-kg: 25
    excess-fee-per-kg: 10.0

logging:
  level:
    root: INFO
    com.skyhigh.skycheck: DEBUG

